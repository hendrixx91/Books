<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Library</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        sans-serif;

      background:
        linear-gradient(
          to bottom,
          #f7f7f7,
          #e9e9e9
        );

      min-height: 100vh;
      color: #111;

      padding: 40px;
    }

    h1 {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -3px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 20px;
      margin-bottom: 50px;
    }

    .search-box {
      display: flex;
      gap: 12px;

      background: rgba(255,255,255,0.6);

      backdrop-filter: blur(20px);

      padding: 14px;

      border-radius: 28px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.08);

      margin-bottom: 50px;

      position: sticky;
      top: 20px;
    }

    input {
      flex: 1;

      border: none;
      background: transparent;

      font-size: 18px;

      outline: none;

      padding: 12px;
    }

    button {
      border: none;

      background: #111;
      color: white;

      padding: 14px 24px;

      border-radius: 20px;

      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    h2 {
      font-size: 36px;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }

    .books {
      display: grid;

      grid-template-columns:
        repeat(auto-fill, minmax(220px, 1fr));

      gap: 24px;

      margin-bottom: 70px;
    }

    .card {
      background: rgba(255,255,255,0.7);

      backdrop-filter: blur(20px);

      border-radius: 30px;

      overflow: hidden;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.08);

      transition:
        transform 0.4s cubic-bezier(0.22,1,0.36,1),
        box-shadow 0.4s;
    }

    .card:hover {
      transform: translateY(-10px);

      box-shadow:
        0 20px 40px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;

      margin-bottom: 8px;
    }

    .author {
      color: #666;
      font-size: 14px;

      margin-bottom: 20px;
    }

    .save-btn {
      width: 100%;
    }

    .empty {
      background: rgba(255,255,255,0.6);

      backdrop-filter: blur(20px);

      padding: 50px;

      border-radius: 30px;

      color: #666;

      text-align: center;
    }
  </style>
</head>

<body>

  <h1>My Library</h1>

  <p class="subtitle">
    Save and organize the books you’ve read.
  </p>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="Search books..."
    />

    <button onclick="searchBooks()">
      Search
    </button>
  </div>

  <h2>Search Results</h2>

  <div id="results" class="books"></div>

  <h2>Your Bookshelf</h2>

  <div id="savedBooks" class="books"></div>

  <script>
    let savedBooks =
      JSON.parse(localStorage.getItem("savedBooks"))
      || []

    renderSavedBooks()

    async function searchBooks() {

      const query =
        document.getElementById("searchInput").value

      if (!query) return

      const res =
        await fetch(
          `https://www.googleapis.com/books/v1/volumes?q=${query}`
        )

      const data = await res.json()

      const resultsDiv =
        document.getElementById("results")

      resultsDiv.innerHTML = ""

      data.items.forEach(book => {

        const info = book.volumeInfo

        const card = document.createElement("div")

        card.className = "card"

        card.innerHTML = `
          <img src="${
            info.imageLinks?.thumbnail ||
            'https://placehold.co/200x300'
          }">

          <div class="card-content">

            <div class="title">
              ${info.title}
            </div>

            <div class="author">
              ${info.authors?.join(", ") || "Unknown"}
            </div>

            <button
              class="save-btn"
              onclick='saveBook(${JSON.stringify(book)})'
            >
              Save
            </button>

          </div>
        `

        resultsDiv.appendChild(card)
      })
    }

    function saveBook(book) {

      const info = book.volumeInfo

      const exists =
        savedBooks.find(b => b.id === book.id)

      if (exists) return

      savedBooks.push({
        id: book.id,
        title: info.title,
        author:
          info.authors?.join(", ") || "Unknown",
        image:
          info.imageLinks?.thumbnail ||
          "https://placehold.co/200x300"
      })

      localStorage.setItem(
        "savedBooks",
        JSON.stringify(savedBooks)
      )

      renderSavedBooks()
    }

    function renderSavedBooks() {

      const savedDiv =
        document.getElementById("savedBooks")

      savedDiv.innerHTML = ""

      if (savedBooks.length === 0) {

        savedDiv.innerHTML = `
          <div class="empty">
            Your bookshelf is empty.
          </div>
        `

        return
      }

      savedBooks.forEach(book => {

        const card =
          document.createElement("div")

        card.className = "card"

        card.innerHTML = `
          <img src="${book.image}">

          <div class="card-content">

            <div class="title">
              ${book.title}
            </div>

            <div class="author">
              ${book.author}
            </div>

          </div>
        `

        savedDiv.appendChild(card)
      })
    }
  </script>

</body>
</html>
